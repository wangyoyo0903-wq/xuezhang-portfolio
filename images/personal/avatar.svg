<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="50" cy="50" r="80" fill="#fff" opacity="0.1"/>
  <circle cx="350" cy="350" r="100" fill="#fff" opacity="0.1"/>
  
  <!-- 头像容器 -->
  <circle cx="200" cy="160" r="90" fill="#fff" filter="url(#shadow)"/>
  <circle cx="200" cy="160" r="85" fill="url(#circleGrad)"/>
  
  <!-- 人物轮廓 -->
  <circle cx="200" cy="130" r="35" fill="#fff"/>
  <ellipse cx="200" cy="200" rx="50" ry="35" fill="#fff"/>
  
  <!-- 眼睛 -->
  <circle cx="185" cy="125" r="5" fill="#667eea"/>
  <circle cx="215" cy="125" r="5" fill="#667eea"/>
  
  <!-- 微笑 -->
  <path d="M185 145 Q200 160 215 145" stroke="#667eea" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 名字标签 -->
  <rect x="120" y="280" width="160" height="50" rx="25" fill="#fff" filter="url(#shadow)"/>
  <text x="200" y="312" text-anchor="middle" fill="#667eea" font-size="20" font-weight="bold" font-family="Arial, sans-serif">星星学长</text>
  
  <!-- 副标题 -->
  <text x="200" y="360" text-anchor="middle" fill="#fff" font-size="14" font-family="Arial, sans-serif" opacity="0.9">求职规划师 · 产品经理</text>
</svg>