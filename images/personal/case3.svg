<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg3)"/>
  
  <!-- 装饰元素 -->
  <circle cx="100" cy="100" r="100" fill="#fff" opacity="0.1"/>
  <circle cx="700" cy="500" r="150" fill="#fff" opacity="0.08"/>
  
  <!-- 左侧：原薪资 -->
  <rect x="80" y="150" width="260" height="200" rx="16" fill="#fff" filter="url(#shadow3)"/>
  <text x="210" y="190" text-anchor="middle" fill="#999" font-size="14">跳槽前</text>
  <text x="210" y="250" text-anchor="middle" fill="#666" font-size="48" font-weight="bold">15K</text>
  <text x="210" y="280" text-anchor="middle" fill="#999" font-size="12">月薪</text>
  <rect x="110" y="300" width="200" height="30" rx="8" fill="#f0f0f0"/>
  <text x="210" y="322" text-anchor="middle" fill="#999" font-size="12">工作3年 · 遇到瓶颈</text>
  
  <!-- 中间：提升箭头 -->
  <rect x="370" y="200" width="60" height="100" rx="30" fill="#fff" filter="url(#shadow3)"/>
  <text x="400" y="245" text-anchor="middle" fill="#f5576c" font-size="24" font-weight="bold">↑</text>
  <text x="400" y="275" text-anchor="middle" fill="#f5576c" font-size="14" font-weight="bold">+30%</text>
  
  <!-- 右侧：新薪资 -->
  <rect x="460" y="150" width="260" height="200" rx="16" fill="#fff" filter="url(#shadow3)"/>
  <text x="590" y="190" text-anchor="middle" fill="#28a745" font-size="14">跳槽后</text>
  <text x="590" y="250" text-anchor="middle" fill="#28a745" font-size="48" font-weight="bold">20K</text>
  <text x="590" y="280" text-anchor="middle" fill="#28a745" font-size="12">月薪</text>
  <rect x="490" y="300" width="200" height="30" rx="8" fill="#28a745"/>
  <text x="590" y="322" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">独角兽公司 · 新机遇</text>
  
  <!-- 成功要素 -->
  <rect x="150" y="400" width="500" height="80" rx="12" fill="#fff" filter="url(#shadow3)"/>
  <rect x="170" y="420" width="100" height="40" rx="8" fill="#667eea"/>
  <text x="220" y="446" text-anchor="middle" fill="#fff" font-size="11">职业规划</text>
  <rect x="290" y="420" width="100" height="40" rx="8" fill="#11998e"/>
  <text x="340" y="446" text-anchor="middle" fill="#fff" font-size="11">简历优化</text>
  <rect x="410" y="420" width="100" height="40" rx="8" fill="#f5576c"/>
  <text x="460" y="446" text-anchor="middle" fill="#fff" font-size="11">面试辅导</text>
  <rect x="530" y="420" width="100" height="40" rx="8" fill="url(#gold)"/>
  <text x="580" y="446" text-anchor="middle" fill="#fff" font-size="11">内推机会</text>
  
  <!-- 标题 -->
  <text x="400" y="530" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold" font-family="Arial, sans-serif">💰 薪资提升 30%！</text>
  <text x="400" y="570" text-anchor="middle" fill="#fff" font-size="16" font-family="Arial, sans-serif" opacity="0.9">跳槽成功 · 开启新篇章</text>
</svg>