<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg2)"/>
  
  <!-- 装饰元素 -->
  <circle cx="700" cy="100" r="120" fill="#fff" opacity="0.1"/>
  <circle cx="100" cy="500" r="150" fill="#fff" opacity="0.08"/>
  
  <!-- 左侧：传统行业 -->
  <rect x="80" y="150" width="250" height="180" rx="12" fill="#fff" filter="url(#shadow2)"/>
  <rect x="100" y="175" width="210" height="10" rx="5" fill="#e0e0e0"/>
  <text x="205" y="215" text-anchor="middle" fill="#666" font-size="14">传统销售行业</text>
  <rect x="100" y="240" width="180" height="6" rx="3" fill="#e8e8e8"/>
  <rect x="100" y="260" width="160" height="6" rx="3" fill="#e8e8e8"/>
  <rect x="100" y="280" width="140" height="6" rx="3" fill="#e8e8e8"/>
  <text x="205" y="310" text-anchor="middle" fill="#999" font-size="12">想转行...</text>
  
  <!-- 箭头 -->
  <path d="M350 240 L400 240" stroke="#fff" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="390,235 400,240 390,245" fill="#fff"/>
  
  <!-- 右侧：互联网 -->
  <rect x="420" y="150" width="280" height="180" rx="12" fill="#fff" filter="url(#shadow2)"/>
  <rect x="440" y="175" width="240" height="10" rx="5" fill="#11998e"/>
  <text x="560" y="215" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">腾讯 · 运营专员</text>
  <rect x="440" y="240" width="200" height="6" rx="3" fill="#e8e8e8"/>
  <rect x="440" y="260" width="180" height="6" rx="3" fill="#e8e8e8"/>
  <rect x="440" y="280" width="160" height="6" rx="3" fill="#e8e8e8"/>
  <rect x="440" y="300" width="100" height="20" rx="4" fill="#28a745"/>
  <text x="490" y="315" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">转行成功</text>
  
  <!-- 学习计划 -->
  <rect x="200" y="380" width="400" height="100" rx="12" fill="#fff" filter="url(#shadow2)"/>
  <text x="400" y="415" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">📚 学习计划 + 项目实战</text>
  <rect x="230" y="435" width="120" height="25" rx="6" fill="#667eea"/>
  <text x="290" y="453" text-anchor="middle" fill="#fff" font-size="11">技能培训</text>
  <rect x="370" y="435" width="120" height="25" rx="6" fill="#11998e"/>
  <text x="430" y="453" text-anchor="middle" fill="#fff" font-size="11">内推机会</text>
  
  <!-- 标题 -->
  <text x="400" y="530" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold" font-family="Arial, sans-serif">🚀 转行成功！</text>
  <text x="400" y="570" text-anchor="middle" fill="#fff" font-size="16" font-family="Arial, sans-serif" opacity="0.9">传统行业成功转行互联网</text>
</svg>