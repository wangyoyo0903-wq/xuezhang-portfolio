<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg1)"/>
  
  <!-- 装饰元素 -->
  <circle cx="100" cy="100" r="150" fill="#fff" opacity="0.05"/>
  <circle cx="700" cy="500" r="200" fill="#fff" opacity="0.05"/>
  <circle cx="650" cy="100" r="80" fill="#fff" opacity="0.1"/>
  
  <!-- 简历文档 -->
  <rect x="80" y="120" width="280" height="200" rx="12" fill="#fff" filter="url(#shadow1)"/>
  <rect x="100" y="145" width="240" height="12" rx="6" fill="#e0e0e0"/>
  <rect x="100" y="170" width="200" height="8" rx="4" fill="#e8e8e8"/>
  <rect x="100" y="190" width="220" height="8" rx="4" fill="#e8e8e8"/>
  <rect x="100" y="210" width="180" height="8" rx="4" fill="#e8e8e8"/>
  <rect x="100" y="240" width="100" height="30" rx="6" fill="url(#accent1)"/>
  <text x="150" y="262" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">优化中...</text>
  
  <!-- 成功标志 -->
  <circle cx="550" cy="180" r="70" fill="#fff" filter="url(#shadow1)"/>
  <circle cx="550" cy="180" r="60" fill="#28a745"/>
  <path d="M520 180 L540 200 L580 160" stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Offer文档 -->
  <rect x="450" y="280" width="280" height="180" rx="12" fill="#fff" filter="url(#shadow1)"/>
  <rect x="470" y="305" width="240" height="10" rx="5" fill="#667eea"/>
  <text x="590" y="340" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">字节跳动 Offer</text>
  <rect x="470" y="360" width="180" height="6" rx="3" fill="#e8e8e8"/>
  <rect x="470" y="380" width="200" height="6" rx="3" fill="#e8e8e8"/>
  <rect x="470" y="410" width="80" height="25" rx="6" fill="#28a745"/>
  <text x="510" y="428" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">25K/月</text>
  
  <!-- 标题 -->
  <text x="400" y="520" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold" font-family="Arial, sans-serif">🎉 Offer 成功！</text>
  <text x="400" y="560" text-anchor="middle" fill="#fff" font-size="16" font-family="Arial, sans-serif" opacity="0.9">应届生逆袭字节跳动</text>
</svg>